site_name: Magic Castle on OVHcloud
site_url: https://chrstphdm.github.io/magic-castle-ovhcloud
site_description: >-
  Community guide for deploying a SLURM HPC cluster on OVHcloud with Magic Castle.
  Covers Terraform setup, network configuration, bioinformatics stack, Nextflow
  integration, and production SLURM tuning.
site_author: Christophe Demay
repo_url: https://github.com/chrstphdm/magic-castle-ovhcloud
repo_name: chrstphdm/magic-castle-ovhcloud

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - tables
  - admonition

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://chrstphdm.github.io/
      name: Christophe Demay — Bioinformatics Consultant
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/christophedemay
    - icon: fontawesome/brands/github
      link: https://github.com/chrstphdm

copyright: >-
  &copy; 2026 <a href="https://chrstphdm.github.io/">Christophe Demay</a> —
  Licensed under CC BY 4.0

nav:
  - Home: index.md
  - Prerequisites: 01-prerequisites.md
  - Architecture: 02-architecture.md
  - Network Setup: 03-network-setup.md
  - main.tf Walkthrough: 04-main-tf.md
  - OVHcloud Specifics: 05-ovhcloud-specifics.md
  - Bioinformatics Stack: 06-bioinfo-stack.md
  - SLURM Tuning: 07-slurm-tuning.md
  - Nextflow on Magic Castle: 08-nextflow.md
  - Deploy and Destroy: 09-deployment.md
  - Troubleshooting: 10-troubleshooting.md
